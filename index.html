<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clean Apple Scroll</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

nav {
  position:fixed;
  top:0;
  width:100%;
  padding:20px;
  z-index:100;
}

section {
  height:200vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

h1 {
  font-size:60px;
  text-align:center;
  transition:transform 0.1s linear;
}

video {
  width:60%;
  border-radius:20px;
}
</style>
</head>

<body>

<div id="root"></div>

<script type="module">
import React, { useEffect, useRef } from "https://esm.sh/react@18";
import { createRoot } from "https://esm.sh/react-dom@18/client";

function App() {
  const textRef = useRef(null);
  const videoRef = useRef(null);

  useEffect(() => {
    const onScroll = () => {
      const y = window.scrollY;

      // PARALLAX
      if (textRef.current) {
        textRef.current.style.transform =
          `translateY(${y * -0.2}px) scale(${1 + y * 0.0005})`;
      }

      // VIDEO SCROLL SYNC
      if (videoRef.current) {
        videoRef.current.currentTime = y / 800;
      }
    };

    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  return (
    <>
      <nav>Mobile1x</nav>

      <section>
        <h1 ref={textRef}>
          Apple-Level Scroll Experience
        </h1>
      </section>

      <section>
        <video
          ref={videoRef}
          src="https://www.w3schools.com/html/mov_bbb.mp4"
          muted
          playsInline
        />
      </section>

      <section>
        <h1>Precision Engineering</h1>
      </section>
    </>
  );
}

createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
