<script type="text/babel">

const { useEffect, useRef, useState } = React;

function App() {

  const heroText = useRef();
  const heroSub = useRef();

  /* SCROLL ENGINE (Apple style) */
  useEffect(() => {
    const handleScroll = () => {
      const scrollY = window.scrollY;

      // PARALLAX TEXT
      if (heroText.current) {
        heroText.current.style.transform =
          `translateY(${scrollY * -0.2}px)`;
      }

      // SCALE SUBTEXT
      if (heroSub.current) {
        const scale = 1 + scrollY * 0.0005;
        heroSub.current.style.transform = `scale(${scale})`;
      }
    };

    window.addEventListener("scroll", handleScroll);
    return () => window.removeEventListener("scroll", handleScroll);
  }, []);

  /* FADE IN */
  useEffect(() => {
    const els = document.querySelectorAll(".fade");

    const obs = new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(e.isIntersecting){
          e.target.classList.add("visible");
        }
      });
    });

    els.forEach(el=>obs.observe(el));
  }, []);

  return (
    <>
      <nav>
        <div>Mobile1x</div>
      </nav>

      {/* HERO */}
      <section className="hero">
        <div className="hero-inner">
          <h1 ref={heroText}>
            The Future Is Here.
          </h1>

          <p ref={heroSub}>
            Scroll to experience innovation
          </p>
        </div>
      </section>

      {/* STORY */}
      <section className="section">
        <div className="sticky">
          <h1 className="fade">Precision Engineering</h1>
        </div>
      </section>

      <section className="section">
        <div className="sticky">
          <h1 className="fade">Seamless Performance</h1>
        </div>
      </section>

      <VideoScroll />

    </>
  );
}

/* VIDEO SCROLL */
function VideoScroll(){
  const ref = useRef();

  useEffect(()=>{
    const onScroll = ()=>{
      const scrollTop = window.scrollY;
      const duration = 800;

      if(ref.current){
        ref.current.currentTime = scrollTop / duration;
      }
    };

    window.addEventListener("scroll", onScroll);
    return ()=>window.removeEventListener("scroll", onScroll);
  },[]);

  return (
    <section className="section">
      <div className="sticky">
        <video
          ref={ref}
          src="https://www.w3schools.com/html/mov_bbb.mp4"
          muted
          playsInline
        />
      </div>
    </section>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
