<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Apple-Level Scroll Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root,
[data-theme="white"] {
  --bg:#F8F7F3;
  --ink:#0D1420;
}

[data-theme="yellow"] {
  --bg:#FFF8D6;
  --ink:#3A2E00;
}

[data-theme="black"] {
  --bg:#0D1420;
  --ink:#F8F7F3;
}

body {
  font-family:'Plus Jakarta Sans', sans-serif;
  background:var(--bg);
  color:var(--ink);
  overflow-x:hidden;
}

/* NAV */
nav {
  position:fixed;
  top:0;
  width:100%;
  height:64px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 5%;
  backdrop-filter:blur(12px);
  z-index:100;
}

/* HERO */
.hero {
  height:200vh;
  position:relative;
}

.hero-inner {
  position:sticky;
  top:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

/* PARALLAX */
.parallax {
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
}

/* STICKY SECTION */
.sticky-section {
  height:300vh;
  position:relative;
}

.sticky-inner {
  position:sticky;
  top:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* VIDEO */
video {
  width:70%;
  border-radius:20px;
}

h1 { font-size:64px; }
p { opacity:0.7; margin-top:10px; }

button {
  margin-left:8px;
  padding:6px 12px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="module">
import { motion, useScroll, useTransform } from "https://esm.sh/framer-motion@10.16.4";
window.motion = motion;
window.useScroll = useScroll;
window.useTransform = useTransform;
</script>

<script type="text/babel">

const { useState, useEffect, useRef } = React;

function App() {
  const [theme, setTheme] = useState("white");
  const ref = useRef(null);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
  }, [theme]);

  const { scrollYProgress } = window.useScroll({
    target: ref,
    offset: ["start start", "end end"]
  });

  const y = window.useTransform(scrollYProgress, [0,1], [0,-200]);
  const scale = window.useTransform(scrollYProgress, [0,1], [1,1.3]);

  return (
    <>
      {/* NAV */}
      <nav>
        <div>Mobile1x</div>
        <div>
          <button onClick={()=>setTheme("white")}>White</button>
          <button onClick={()=>setTheme("yellow")}>Yellow</button>
          <button onClick={()=>setTheme("black")}>Black</button>
        </div>
      </nav>

      {/* HERO PARALLAX */}
      <section className="hero" ref={ref}>
        <div className="hero-inner">
          <window.motion.h1 style={{ y }}>
            Think Different.
          </window.motion.h1>

          <window.motion.p style={{ scale }}>
            Scroll to feel the magic
          </window.motion.p>
        </div>
      </section>

      {/* STICKY PRODUCT SECTION */}
      <section className="sticky-section">
        <div className="sticky-inner">
          <window.motion.div
            initial={{ opacity:0 }}
            whileInView={{ opacity:1 }}
            transition={{ duration:1 }}
          >
            <h1>AirPods Pro</h1>
            <p>Immersive sound. Zero noise.</p>
          </window.motion.div>
        </div>
      </section>

      {/* VIDEO SCROLL SYNC */}
      <VideoScroll />

    </>
  );
}

/* VIDEO SCROLL COMPONENT */
function VideoScroll() {
  const videoRef = useRef(null);

  useEffect(() => {
    const handleScroll = () => {
      const scrollTop = window.scrollY;
      const duration = 1000;

      if (videoRef.current) {
        videoRef.current.currentTime = scrollTop / duration;
      }
    };

    window.addEventListener("scroll", handleScroll);
    return () => window.removeEventListener("scroll", handleScroll);
  }, []);

  return (
    <section className="sticky-section">
      <div className="sticky-inner">
        <video
          ref={videoRef}
          src="https://www.w3schools.com/html/mov_bbb.mp4"
          muted
          playsInline
        />
      </div>
    </section>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
