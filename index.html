<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mobile1x Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:#000;
  --ink:#fff;
}

body {
  font-family:'Plus Jakarta Sans', sans-serif;
  background:var(--bg);
  color:var(--ink);
  overflow-x:hidden;
}

/* NAV */
nav {
  position:fixed;
  top:0;
  width:100%;
  height:64px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 5%;
  z-index:100;
}

/* CANVAS BACKGROUND */
canvas {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-2;
}

/* SECTIONS */
.section {
  height:200vh;
  position:relative;
}

.sticky {
  position:sticky;
  top:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

/* HERO */
.hero {
  height:200vh;
}

.hero-inner {
  position:sticky;
  top:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

/* TEXT */
h1 {
  font-size:64px;
  max-width:900px;
}

p {
  margin-top:10px;
  opacity:0.7;
}

/* VIDEO */
video {
  width:70%;
  border-radius:20px;
}

/* FADE */
.fade {
  opacity:0;
  transform:translateY(40px);
  transition:all 0.8s ease;
}

.fade.visible {
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="module">
import { motion, useScroll, useTransform } from "https://esm.sh/framer-motion@10.16.4";
window.motion = motion;
window.useScroll = useScroll;
window.useTransform = useTransform;
</script>

<script type="text/babel">

const { useEffect, useRef } = React;

function App() {

  const heroRef = useRef(null);

  /* PARALLAX */
  const { scrollYProgress } = window.useScroll({
    target: heroRef,
    offset: ["start start", "end end"]
  });

  const y = window.useTransform(scrollYProgress, [0,1], [0,-200]);
  const scale = window.useTransform(scrollYProgress, [0,1], [1,1.3]);

  /* CANVAS FRAME ANIMATION */
  useEffect(() => {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const frameCount = 100;
    const images = [];

    const currentFrame = i =>
      `https://dummyimage.com/1920x1080/000/fff&text=Frame+${i}`;

    for (let i=0;i<frameCount;i++){
      const img = new Image();
      img.src = currentFrame(i);
      images.push(img);
    }

    const render = i => {
      const img = images[i];
      if(img.complete){
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
      }
    };

    const update = () => {
      const scrollTop = window.scrollY;
      const maxScroll = document.body.scrollHeight - window.innerHeight;
      const progress = scrollTop / maxScroll;
      const frameIndex = Math.floor(progress * frameCount);
      render(frameIndex);
    };

    window.addEventListener("scroll", update);
  }, []);

  /* FADE IN */
  useEffect(() => {
    const els = document.querySelectorAll(".fade");

    const obs = new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(e.isIntersecting){
          e.target.classList.add("visible");
        }
      });
    });

    els.forEach(el=>obs.observe(el));
  }, []);

  return (
    <>
      <nav>
        <div>Mobile1x</div>
      </nav>

      {/* HERO PARALLAX */}
      <section className="hero" ref={heroRef}>
        <div className="hero-inner">
          <window.motion.h1 style={{ y }}>
            The Future Is Here.
          </window.motion.h1>

          <window.motion.p style={{ scale }}>
            Scroll to experience innovation
          </window.motion.p>
        </div>
      </section>

      {/* STICKY STORY */}
      <section className="section">
        <div className="sticky">
          <h1 className="fade">Precision Engineering</h1>
          <p className="fade">Every detail matters</p>
        </div>
      </section>

      <section className="section">
        <div className="sticky">
          <h1 className="fade">Seamless Performance</h1>
          <p className="fade">Built for speed</p>
        </div>
      </section>

      {/* VIDEO SCROLL */}
      <VideoScroll />

    </>
  );
}

/* VIDEO SYNC */
function VideoScroll(){
  const ref = useRef();

  useEffect(()=>{
    const onScroll = ()=>{
      const scrollTop = window.scrollY;
      const duration = 800;

      if(ref.current){
        ref.current.currentTime = scrollTop / duration;
      }
    };

    window.addEventListener("scroll", onScroll);
    return ()=>window.removeEventListener("scroll", onScroll);
  },[]);

  return (
    <section className="section">
      <div className="sticky">
        <video
          ref={ref}
          src="https://www.w3schools.com/html/mov_bbb.mp4"
          muted
          playsInline
        />
      </div>
    </section>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
